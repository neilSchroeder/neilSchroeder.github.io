<svg xmlns="http://www.w3.org/2000/svg" width="400" height="100">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.005 0.15" numOctaves="4" seed="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feComponentTransfer in="gray" result="adjusted">
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="400" height="100" fill="#1c2233"/>
  <rect width="400" height="100" filter="url(#grain)" fill="#a08060" opacity="0.08"/>
  <!-- subtle horizontal grain lines -->
  <line x1="0" y1="20" x2="400" y2="21" stroke="#8b7355" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="45" x2="400" y2="44" stroke="#8b7355" stroke-width="0.4" opacity="0.05"/>
  <line x1="0" y1="68" x2="400" y2="69" stroke="#8b7355" stroke-width="0.3" opacity="0.07"/>
  <line x1="0" y1="85" x2="400" y2="86" stroke="#8b7355" stroke-width="0.2" opacity="0.04"/>
</svg>
